name: FusionBoa CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python --version

      - name: Test fusionboa version
        run: python fusionboa.py version

      - name: Test fusionboa targets
        run: python fusionboa.py targets

      - name: Test tokens (debug)
        run: python fusionboa.py tokens fusionboa_lang/examples/hello.fusboa

      - name: Test AST (debug)
        run: python fusionboa.py ast fusionboa_lang/examples/hello.fusboa

      - name: Test hello.fusboa → Python
        run: python fusionboa.py run fusionboa_lang/examples/hello.fusboa -t py

      - name: Test hello.fusboa → JavaScript
        run: python fusionboa.py run fusionboa_lang/examples/hello.fusboa -t js

      - name: Test hello.fusboa → Ruby (compile only)
        run: python fusionboa.py build fusionboa_lang/examples/hello.fusboa -t rb

      - name: Test hello.fusboa → Go (compile only)
        run: python fusionboa.py build fusionboa_lang/examples/hello.fusboa -t go

      - name: Test hello.fusboa → Rust (compile only)
        run: python fusionboa.py build fusionboa_lang/examples/hello.fusboa -t rs

      - name: Test multi-target build (py, js, html, json)
        run: python fusionboa.py build fusionboa_lang/examples/app.fusboa --targets py,js,html,json

      - name: Test show generated code
        run: python fusionboa.py run fusionboa_lang/examples/hello.fusboa -t py -s

      - name: Show generated build outputs
        shell: bash
        run: |
          echo "Generated files:"
          find . -name "*.py" -o -name "*.js" -o -name "*.html" -o -name "*.json" 2>/dev/null | head -20 || echo "No build outputs found"

      - name: Test fusionboa format
        run: python fusionboa.py format fusionboa_lang/examples/hello.fusboa

      - name: Test fusionboa help
        run: python fusionboa.py help

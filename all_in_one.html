<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FusionBoa App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <h1>Welcome to FusionBoa</h1>
      <p>One language to rule them all</p>
      <button class="cta" />
    </header>
    <main>
      <section id="features">
        <h2>Features</h2>
        <div class="feature-grid">
          <div class="card">
            <h3>Multi-Language</h3>
            <p>Write once, compile to any language</p>
          </div>
          <div class="card">
            <h3>English-Like</h3>
            <p>Readable syntax for everyone</p>
          </div>
          <div class="card">
            <h3>Zero Clutter</h3>
            <p>All your code in one file</p>
          </div>
        </div>
      </section>
      <section id="data">
        <h2>Data Results</h2>
        <div id="results"></div>
      </section>
    </main>
    <footer>
      <p>Copyright 2026 FusionBoa Language</p>
    </footer>
  </body>
</html>
